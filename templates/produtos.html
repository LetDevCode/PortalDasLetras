<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Livros - Portal das Letras</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>📚 Portal das Letras</h1>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/produtos">Livros</a>
    <a href="/sobre">Sobre</a>
    <a href="/contato">Contato</a>
    <a href="/login">Login</a>
    <a href="/cadastro">Cadastro</a>
</nav>

<div class="container">

    <h2>Catálogo de Livros</h2>

    <p>
        <a href="/cadastrar_livro">
            <button>➕ Cadastrar Novo Livro</button>
        </a>
    </p>

    <table border="1" width="100%" cellpadding="10">

        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Preço</th>
        </tr>

        {% for livro in livros %}
        <tr>
            <td>{{ livro.id }}</td>
            <td>{{ livro.titulo }}</td>
            <td>{{ livro.autor }}</td>
            <td>R$ {{ livro.preco }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

<footer>
    © 2026 Portal das Letras
</footer>

</body>
</html>
